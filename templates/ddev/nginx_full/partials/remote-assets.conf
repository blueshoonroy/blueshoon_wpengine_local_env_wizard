#remote-assets

    # Serve a local upload if it exists, otherwise reverse-proxy it from production.
    location ~ ^/wp-content/uploads/(.*)$ {
        try_files $uri @remote_assets;
    }

    # Server-side proxy (not a 302 redirect): the container fetches the asset from
    # production and serves it under the local URL. Setting Host/Referer to the
    # remote domain keeps it working through hotlink protection.
    location @remote_assets {
        resolver 127.0.0.11 ipv6=off valid=30s;
        set $remote_assets_host ${REMOTE_DOMAIN};
        proxy_pass https://$remote_assets_host$request_uri;
        proxy_ssl_server_name on;
        proxy_set_header Host $remote_assets_host;
        proxy_set_header Referer https://$remote_assets_host;
        proxy_hide_header Set-Cookie;
        proxy_intercept_errors off;
    }

    ## /remote-assets
